          - generic [ref=e21]:
            - paragraph [ref=e22]:
              - text: As Marqeta’s
              - strong [ref=e23]: Production Support Engineer II
              - text: ", you will play a pivotal role in our commitment to customer satisfaction and the seamless operation of our products and services. You will serve as the first line of contact for our customers, adeptly handling and resolving complex technical issues while translating technical jargon into user-friendly language. Your broad knowledge base across various technologies will be instrumental in addressing a wide range of problems. In addition, you will collaborate with our Engineering teams to manage software updates and bug fixes."
            - paragraph [ref=e24]: Your role will also involve becoming an expert in all areas of Marqeta's products and services and ensuring that our customers can fully utilize our offerings. As a customer advocate, you will ensure that our customers' needs and concerns are heard and addressed in our product development and service delivery processes. At Marqeta, we value the essential role our Production Support Engineers play in our service delivery chain and look forward to welcoming you to our team.
            - paragraph [ref=e25]:
              - text: We work
              - link "Flexible First" [ref=e26] [cursor=pointer]:
                - /url: https://www.marqeta.com/blog/2022/05/10/flexible-first
              - text: . This role can be performed remotely in the United States,
              - strong [ref=e27]: only in Pacific Time-zone.
            - paragraph [ref=e28]:
              - strong [ref=e29]: The Impact You’ll Have
            - list [ref=e30]:
              - listitem [ref=e31]: Become a Marqeta product expert
              - listitem [ref=e32]: Provide high-quality support, and take ownership in responding to inquiries, issues and escalation inquiries through tickets, emails, and other channels
              - listitem [ref=e33]: Perform problem-solving, diagnosing, root cause analysis, and generate corrective action plans for issues
              - listitem [ref=e34]: Work cross-functionally to resolve issues and provide customer care
              - listitem [ref=e35]: Provide on-call support for rotations and escalations
              - listitem [ref=e36]: Assist in monitoring production transaction volume, functionality, capacity, and performance
              - listitem [ref=e37]: Be proactive in monitoring, optimizing issuer resolution, and implementing corrective action planning
              - listitem [ref=e38]: Interact with Product, Engineering, and Technical Operational teams to provide feedback on production support related issues and improvements
              - listitem [ref=e39]: Document process, product, and industry learnings relentlessly to identify pain points and trends to help the team and organization grow and improve
            - paragraph [ref=e40]:
              - strong [ref=e41]: Who You Are
            - list [ref=e42]:
              - listitem [ref=e43]: 3+ years of experience in Technical Support, Production Support, or IT Support for B2B customers
              - listitem [ref=e44]: Ability to work in a customer-facing role, with strong written and verbal communication skills, with the ability to listen, show empathy, and also be able to converse with both internal and external technical and non-technical stakeholders
              - listitem [ref=e45]: Committed, flexible through on-call rotations, and demonstrated ability to maintain high levels of productivity with minimal supervision
              - listitem [ref=e46]: Experience with ticketing systems (such as Salesforce, Jira, Confluence, etc)
              - listitem [ref=e47]: "Good understanding of API technologies and troubleshooting (i.e.: you know what cURL does, know HTTP response codes, etc.)"
              - listitem [ref=e48]: Comfortable working within a Linux environment
              - listitem [ref=e49]: Intermediate SQL knowledge (relational database experience preferred)
              - listitem [ref=e50]: Scriptwriting - Python, Ruby, Shell, etc
              - listitem [ref=e51]: Experience with logging and monitoring tools such as Kibana, Splunk, AppDynamics, Sumo Logic, Grafana, Datadog, and New Relic
            - paragraph [ref=e52]:
              - strong [ref=e53]: Nice-To-Haves
            - list [ref=e54]:
              - listitem [ref=e55]: Experience in payments and/or accounting systems.
              - listitem [ref=e56]: Experience working at a high-growth company.
            - paragraph [ref=e57]:
              - strong [ref=e58]: Your Manager
            - list [ref=e59]:
              - listitem [ref=e60]: David Foo
            - paragraph [ref=e61]:
