            - paragraph [ref=e74]:
              - strong [ref=e75]: Compensation and Benefits
            - paragraph [ref=e76]: "Marqeta is a Flex First company which allows you to choose your best working environment, whether that be from home or at a company office. To support Flex First, we calibrate pay to a competitive value according to working location. Compensation is aligned according to three tiers within the United States:"
            - list [ref=e77]:
              - listitem [ref=e78]:
                - strong [ref=e79]: National
                - text: ": A baseline tier that applies to most of the geographic territory of the United States."
              - listitem [ref=e80]:
                - strong [ref=e81]: Premium
                - text: ": Slightly elevated from the National tier, and oriented toward a narrower set of higher cost-of-living areas, such as Los Angeles CA and Seattle WA"
              - listitem [ref=e82]:
                - strong [ref=e83]: Premium Plus
                - text: ": A tier for the most expensive working areas, like the San Francisco Bay area and New York City."
            - paragraph [ref=e84]:
              - text: Visit
              - link "this page" [ref=e85] [cursor=pointer]:
                - /url: https://www.marqeta.com/company/salaryzones
              - text: or consult with a Recruiter to determine which tier would be applicable to you.
            - paragraph [ref=e86]:
              - text: When determining salaries, we consider several factors including, but not limited to, skills, prior experience, and work location. The new-hire
              - strong [ref=e87]: base salary
              - text: "range in USD for this position is:"
            - list [ref=e88]:
              - listitem [ref=e89]: "National: 72,000 - 90,000"
              - listitem [ref=e90]: "Premium: 77,900 - 97,400"
              - listitem [ref=e91]: "Premium Plus: 84,700 - 105,900"
            - paragraph [ref=e92]: We also believe in recognizing the contributions of our people. That's why we award annual bonuses to eligible employees, rewarding both individual performance and the success of the entire company.
            - paragraph [ref=e93]: Along with monetary compensation, Marqeta offers
            - list [ref=e94]:
              - listitem [ref=e95]: Multiple health insurance options
              - listitem [ref=e96]: Flexible time off – take what you need
              - listitem [ref=e97]: Retirement savings program with company contribution and after tax contributions
              - listitem [ref=e98]: Equity in a publicly-traded company and an Employee Stock Purchase Program
              - listitem [ref=e99]: Family-forming benefits, fertility support, and up to 20 weeks of Parental Leave
              - listitem [ref=e100]: Free therapy sessions, financial and professional coaching, and legal advice
              - listitem [ref=e101]: Monthly stipend to support our remote work model
              - listitem [ref=e102]: Annual “development dollars” to support our people growth and development
              - listitem [ref=e103]: Through Flex First, the freedom to live and work wherever you and your family thrive
            - paragraph [ref=e104]
            - paragraph [ref=e105]
          - generic [ref=e106]:
            - heading "About Marqeta" [level=4] [ref=e107]:
              - strong [ref=e108]: About Marqeta
            - paragraph [ref=e109]: Marqeta is on a mission to change the way money moves. We’re one of the earliest enablers of embedded finance, a market opportunity sized up in the trillions. Our card issuing platform provides unprecedented flexibility and control for companies to issue cards, authorize transactions, and manage payment operations in real time. Marqeta is powering the most well known brands in the new economy (Block, Cash App, Affirm, Instacart, Doordash, Uber, Walmart, etc). You don’t need to be a Payments expert to join the Marqeta Team, let us help you with that. This is the opportunity of a lifetime to work with innovators around the world and unlock equitable financial access for all.
            - separator [ref=e110]
            - heading "Marqeta’s Values" [level=4] [ref=e111]:
              - strong [ref=e112]: Marqeta’s Values
            - paragraph [ref=e113]:
              - strong [ref=e114]: "– Solve for the Customer:"
              - text: With a deep understanding of our customers' business and empathy for their needs, we deliver products and services that drive their success. Earning and keeping their trust guides everything we do.
            - paragraph [ref=e115]:
              - strong [ref=e116]: "– Do What's Right:"
              - text: Knowing businesses and livelihoods depend on us, we pursue solutions that disrupt responsibly and deliver high-quality results that our customers count on. We own our work from start to finish.
            - paragraph [ref=e117]:
              - strong [ref=e118]: "– Simplify and Innovate:"
              - text: We approach challenges with curiosity and take smart risks. Innovation comes from finding better, simpler ways to achieve extraordinary outcomes.
            - paragraph [ref=e119]:
              - strong [ref=e120]: "– Win as a Team:"
              - text: We succeed together by embracing diverse perspectives and pushing each other to raise the bar. We lead with humility and set aside hierarchy to work as a team.
            - paragraph [ref=e121]:
              - strong [ref=e122]: "– Make it Count:"
              - text: We drive forward with focus and agility. With a sense of urgency and purpose, we get the job done, and done right.
            - separator [ref=e123]
            - paragraph [ref=e124]:
              - strong [ref=e125]: Equal Employment Opportunity, Accommodations and Privacy
            - paragraph [ref=e126]: Marqeta is an equal opportunity employer committed to an inclusive workplace that fosters belonging. We do not discriminate based on race, color, religion, sex (including pregnancy, lactation, childbirth, or related medical conditions), veteran status or uniformed service member status, age, national origin or ancestry, citizenship or immigration status, physical or mental disability, gender identity, gender expression, sexual orientation, genetic information (including testing or characteristics) or any other characteristic protected by applicable law. We also consider qualified applicants with criminal histories, consistent with legal requirements.
            - paragraph [ref=e127]:
              - text: Marqeta endeavors to make reasonable accommodations for applicants with disabilities. If you are an individual with a disability and require a reasonable accommodation to submit this application, complete any pre-employment testing, or otherwise participate in the employee selection process, please submit
              - link "this form" [ref=e128] [cursor=pointer]:
                - /url: https://forms.gle/Nx79JaH22WR94nBh7
              - text: with your specific accommodation request.
            - paragraph [ref=e129]:
              - text: Personal data that is provided as part of the application and recruitment process is processed in accordance with the
              - link "Applicant Privacy Notice" [ref=e130] [cursor=pointer]:
                - /url: https://www.marqeta.com/company/applicant
              - text: . Additional information for California residents can be found
              - link "here" [ref=e131] [cursor=pointer]:
                - /url: https://www.marqeta.com/applicant#1lOHLMWCqwzsMvVd1FY1XD
              - text: .
